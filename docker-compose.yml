version: "3.9"
name: b2bleads-stack

networks:
  ativaai:
    external: true

services:
  backend-cnaes:
    container_name: backend-cnaes
    build:
      context: ./backend-cnaes
      dockerfile: Dockerfile
    image: b2bleads/backend-cnaes:latest
    ports:
      - "3010:3010"
    env_file:
      - ./backend-cnaes/.env
    environment:
      - PORT=3010
    restart: unless-stopped
    networks:
      - ativaai

  busca-empresas:
    container_name: busca-empresas
    build:
      context: ./busca-empresas
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: b2bleads/busca-empresas:latest
    ports:
      - "8080:80"
    depends_on:
      - backend-cnaes
    restart: unless-stopped
    networks:
      - ativaai
