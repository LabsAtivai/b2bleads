version: "3.9"
name: b2bleads-stack

networks:
  ativaai:
    external: true

services:
  backend-cnaes:
    container_name: backend-cnaes
    build:
      context: ./backend-cnaes
      dockerfile: Dockerfile
    ports:
      - "3010:3010"
    environment:
      - PORT=3010
      - DB_HOST=${DB_HOST:-207.244.249.157}
      - DB_PORT=${DB_PORT:-27017}
      - DB_USER=${DB_USER:-admin}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME:-receitafederal}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,https://api-b2b.labsativa.com.br}
      - MAX_EXPORT_ROWS=${MAX_EXPORT_ROWS:-50000}
    restart: unless-stopped
    networks:
      - ativaai

  busca-empresas:
    container_name: busca-empresas
    build:
      context: ./busca-empresas
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "8090:80"
    depends_on:
      - backend-cnaes
    restart: unless-stopped
    networks:
      - ativaai
